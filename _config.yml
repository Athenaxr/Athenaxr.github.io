# Site Info
title: wxFang
tagline: 'Plain Living And High Thinking'
description: 'A Jekyll theme adapted from <a href="http://lanyon.getpoole.com/" target="_blank">Lanyon</a>. Made by <a href="https://github.com/Athenaxr" target="_blank">@wxFang</a>.'
baseurl: "/wxFang"
url: https://github.com/Athenaxr
# http://codinfox.github.io
logo: '/public/logo.png'

# Site configurations
gems:
  - jekyll-paginate
markdown: kramdown
kramdown:
  input: GFM
excerpt_separator: "<!-- more -->"
sass:
  style: compressed
  sass_dir: _scss    
paginate: 5
paginate_path: '/blog/page:num'
permalink: pretty

version: 1.0.0

